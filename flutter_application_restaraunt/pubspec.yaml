name: flutter_application_restaraunt
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.6 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  image_picker: ^1.1.0
  image_picker_for_web: ^3.0.6
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10
  dio: ^5.8.0+1
  get_it: ^8.0.3
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7
  talker_flutter: ^4.7.2
  talker_dio_logger: ^4.7.1
  talker_bloc_logger: ^4.7.2
  json_annotation: ^4.9.0
  hive_flutter: ^1.1.0
  auto_route: ^7.8.4
  flutter_dotenv: ^5.2.1
  mask_text_input_formatter: ^2.9.0
  
  flutter_localizations:
    sdk: flutter
  email_validator: '^3.0.0'
  shared_preferences: ^2.5.3
  web_socket_channel: ^3.0.2
  url_launcher: ^6.3.0  # #13: редирект на платёжную страницу ЮKassa
  flutter_local_notifications: ^17.2.4  # #13: push без Firebase (локальные)

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  json_serializable: ^6.8.0
  hive_generator: ^2.0.1
  auto_route_generator: ^7.3.2
  build_runner: ^2.4.13
  flutter_launcher_icons: "^0.14.3"

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/png/logo.png"
  web:
    generate: true
    image_path: "assets/png/logo.png"
    background_color: "#ffffff"
    theme_color: "#ffffff"
  windows:
    generate: true
    image_path: "assets/png/logo.png"
  macos:
    generate: true
    image_path: "assets/png/logo.png"

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/svg/
    - assets/png/