services:
  app:
    build:
      dockerfile: ./Dockerfile
      context: ./
    environment:
#      APP_CONFIG__DB__URL: postgresql+asyncpg://qwerty:zxc321@pg:5432/fastfood
      APP_CONFIG__DB__URL: postgresql+asyncpg://postgres:postgres@pg:5432/dbfastfood?sslmode=disable
      APP_CONFIG__AUTH_JWT__MAX_TOKEN_COUNT: 10
      APP_CONFIG__SMTP__EMAIL: "admin@site.com"
      APP_CONFIG__SMTP__SERVER: "smtp.gmail.com"
      APP_CONFIG__SMTP__PORT: 587
      APP_CONFIG__SMTP__USER: "imoddinov2003@gmail.com"
      APP_CONFIG__SMTP__PASSWORD: "zofg bywb qhyn swbg"
#    volumes:
#      - ./fastapi-application:/app
    ports:
      - "8000:8000"
    depends_on:
      pg:
        condition: service_healthy
#    command:
#      - python
#      - main.py
    develop:
      watch:
        - action: sync+restart
          path: ./fastapi-application
          target: /app
        - action: rebuild
          path: ./poetry.lock

  pg:
    image: postgres:17.4
    environment:
#      POSTGRES_DB: fastfood
      POSTGRES_DB: dbfastfood
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGDATA: /var/lib/postgresql/data


    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready" ]
      interval: 5s
      timeout: 3s
      retries: 3


  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: "admin@admin.org"
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      pg:
        condition: service_healthy

  maildev:
    image: maildev/maildev
    environment:
      - TZ=Asia/Yekaterinburg
      - MAILDEV_WEB_PORT=1080
      - MAILDEV_SMTP_PORT=1025
    ports:
      - "8080:1080"
      - "1025:1025"
    logging:
      driver: "json-file"
      options:
        max-size: "1m"

volumes:
  pgdata:
